<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Link Tool</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.35), transparent 35%),
        linear-gradient(135deg, #020617, #0f172a, #111827);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 920px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(20px);
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.16);
      color: #c7d2fe;
      font-size: 14px;
      margin-bottom: 18px;
      border: 1px solid rgba(129, 140, 248, 0.35);
    }

    h1 {
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 14px;
    }

    .gradient {
      background: linear-gradient(90deg, #818cf8, #38bdf8, #22c55e);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 17px;
      line-height: 1.7;
      max-width: 680px;
      margin-bottom: 28px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 12px;
      border-radius: 20px;
      margin-bottom: 22px;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      padding: 12px;
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      border: none;
      border-radius: 15px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .result {
      display: none;
      margin-top: 28px;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      animation: fadeUp 0.35s ease;
    }

    .card {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow: hidden;
    }

    .video-frame {
      aspect-ratio: 16 / 9;
      width: 100%;
      border: none;
      display: block;
      background: #020617;
    }

    .info {
      padding: 20px;
    }

    .info h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .info p {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .thumbnail {
      width: 100%;
      border-radius: 18px;
      margin-top: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .notice {
      margin-top: 18px;
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.25);
      padding: 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .error {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    @media (max-width: 760px) {
      .app {
        padding: 22px;
      }

      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .result {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="badge">Frontend-only video link tool</div>

    <h1>
      Preview YouTube or Download
      <span class="gradient">Your Own Videos</span>
    </h1>

    <p class="subtitle">
      Paste a YouTube link to preview it safely, or paste a direct video file URL
      such as .mp4 or .webm to download files that you own or have permission to use.
    </p>

    <div class="search-box">
      <input id="urlInput" type="url" placeholder="Paste YouTube link or direct .mp4/.webm URL..." />
      <button onclick="processLink()">Analyze Link</button>
    </div>

    <div id="errorBox" class="error"></div>

    <section id="result" class="result">
      <div class="card">
        <iframe id="youtubeFrame" class="video-frame" allowfullscreen></iframe>
        <video id="videoPlayer" class="video-frame" controls style="display:none;"></video>
      </div>

      <div class="card info">
        <h2 id="resultTitle">Result</h2>
        <p id="resultText"></p>

        <img id="thumbnail" class="thumbnail" style="display:none;" />

        <div class="actions">
          <button id="openBtn" class="secondary" style="display:none;">Open</button>
          <button id="copyBtn" class="secondary" style="display:none;">Copy Link</button>
          <button id="downloadBtn" style="display:none;">Download File</button>
        </div>

        <div id="notice" class="notice" style="display:none;"></div>
      </div>
    </section>
  </main>

  <script>
    const input = document.getElementById("urlInput");
    const result = document.getElementById("result");
    const errorBox = document.getElementById("errorBox");

    const youtubeFrame = document.getElementById("youtubeFrame");
    const videoPlayer = document.getElementById("videoPlayer");
    const thumbnail = document.getElementById("thumbnail");

    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");
    const notice = document.getElementById("notice");

    const openBtn = document.getElementById("openBtn");
    const copyBtn = document.getElementById("copyBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
      result.style.display = "none";
    }

    function clearError() {
      errorBox.style.display = "none";
    }

    function getYouTubeId(url) {
      const patterns = [
        /youtube\.com\/watch\?v=([^&]+)/,
        /youtu\.be\/([^?&]+)/,
        /youtube\.com\/shorts\/([^?&]+)/,
        /youtube\.com\/embed\/([^?&]+)/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }

      return null;
    }

    function isDirectVideo(url) {
      return /\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url);
    }

    function resetView() {
      youtubeFrame.style.display = "none";
      youtubeFrame.src = "";

      videoPlayer.style.display = "none";
      videoPlayer.src = "";

      thumbnail.style.display = "none";
      thumbnail.src = "";

      openBtn.style.display = "none";
      copyBtn.style.display = "none";
      downloadBtn.style.display = "none";
      notice.style.display = "none";
    }

    function processLink() {
      clearError();
      resetView();

      const url = input.value.trim();

      if (!url) {
        showError("Please paste a video link first.");
        return;
      }

      let parsedUrl;

      try {
        parsedUrl = new URL(url);
      } catch {
        showError("Invalid URL. Please paste a full valid link.");
        return;
      }

      const youtubeId = getYouTubeId(url);

      result.style.display = "grid";

      copyBtn.style.display = "inline-block";
      copyBtn.onclick = async () => {
        await navigator.clipboard.writeText(url);
        copyBtn.textContent = "Copied!";
        setTimeout(() => copyBtn.textContent = "Copy Link", 1200);
      };

      if (youtubeId) {
        const embedUrl = `https://www.youtube.com/embed/${youtubeId}`;
        const thumbUrl = `https://img.youtube.com/vi/${youtubeId}/hqdefault.jpg`;

        youtubeFrame.src = embedUrl;
        youtubeFrame.style.display = "block";

        thumbnail.src = thumbUrl;
        thumbnail.style.display = "block";

        resultTitle.textContent = "YouTube Preview";
        resultText.textContent = "This frontend-only version can preview and embed YouTube videos, but it cannot extract or download YouTube video files.";

        openBtn.style.display = "inline-block";
        openBtn.textContent = "Open on YouTube";
        openBtn.onclick = () => window.open(url, "_blank");

        notice.style.display = "block";
        notice.textContent = "Downloading YouTube videos requires permission from the rights holder and is not supported here. For your own videos, use YouTube Studio or provide a direct video file URL.";
        return;
      }

      if (isDirectVideo(url)) {
        videoPlayer.src = url;
        videoPlayer.style.display = "block";

        resultTitle.textContent = "Direct Video File";
        resultText.textContent = "This appears to be a direct video file link. You can preview and download it if the server allows browser access.";

        openBtn.style.display = "inline-block";
        openBtn.textContent = "Open File";
        openBtn.onclick = () => window.open(url, "_blank");

        downloadBtn.style.display = "inline-block";
        downloadBtn.onclick = () => downloadDirectFile(url);

        return;
      }

      resultTitle.textContent = "Unsupported Link";
      resultText.textContent = "This is not a YouTube video link or a direct video file URL.";

      notice.style.display = "block";
      notice.textContent = "Use a YouTube link for preview, or a direct .mp4/.webm/.mov link for download.";
    }

    async function downloadDirectFile(url) {
      try {
        downloadBtn.textContent = "Downloading...";

        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("Could not fetch the file.");
        }

        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);

        const fileName = url.split("/").pop().split("?")[0] || "video.mp4";

        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();

        a.remove();
        URL.revokeObjectURL(blobUrl);

        downloadBtn.textContent = "Download File";
      } catch (error) {
        downloadBtn.textContent = "Download File";
        showError("Download failed. The file server may block browser downloads using CORS.");
      }
    }
  </script>
</body>
</html>
